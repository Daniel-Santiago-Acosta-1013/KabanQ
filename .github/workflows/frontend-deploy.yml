name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - apps/frontend/**
      - package.json
      - bun.lock
      - infra/**
      - .github/workflows/frontend-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PROJECT_NAME: kabanq
  ENVIRONMENT: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/frontend build

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK bootstrap
        working-directory: infra
        run: cdk bootstrap

      - name: Deploy frontend infrastructure
        working-directory: infra
        run: cdk deploy KabanqFrontendStack --require-approval never --outputs-file cdk-outputs.json

      - name: Read frontend outputs
        working-directory: infra
        run: |
          BUCKET_NAME=$(python -c "import json; d=json.load(open('cdk-outputs.json')); v=list(d.values())[0]; print(v['BucketName'])")
          DISTRIBUTION_ID=$(python -c "import json; d=json.load(open('cdk-outputs.json')); v=list(d.values())[0]; print(v['DistributionId'])")
          echo "BUCKET_NAME=${BUCKET_NAME}" >> "$GITHUB_ENV"
          echo "DISTRIBUTION_ID=${DISTRIBUTION_ID}" >> "$GITHUB_ENV"

      - name: Upload static assets to S3
        working-directory: apps/frontend
        run: aws s3 sync dist "s3://${BUCKET_NAME}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

name: Scheduled Infra Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: Type "destroy kabanq dev"
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  PROJECT_NAME: kabanq
  ENVIRONMENT: dev

jobs:
  destroy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "destroy kabanq dev" ]]; then
            echo "Missing destructive action confirmation."
            exit 1
          fi

      - name: Destroy all stacks
        working-directory: infra
        run: cdk destroy --all --force
